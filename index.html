<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施工報告產生器 — 尚緯消防工程行</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --teal: #1EBCC5;
            --teal-dark: #148A91;
            --teal-deeper: #0E6266;
            --teal-light: #E6F7F8;
            --teal-glow: rgba(30, 188, 197, 0.15);
            --red: #EB0A1C;
            --red-light: #FDE8EA;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --slate-200: #e2e8f0;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;
            --white: #ffffff;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.05);
            --shadow-xl: 0 24px 60px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.06);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            background: var(--slate-100);
            min-height: 100vh;
            color: var(--slate-700);
            line-height: 1.6;
        }

        /* ===== Top Banner ===== */
        .top-banner {
            background: linear-gradient(135deg, var(--teal-deeper) 0%, var(--teal-dark) 40%, var(--teal) 100%);
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .top-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 300px at 10% 80%, rgba(255,255,255,0.06), transparent),
                radial-gradient(ellipse 400px 400px at 90% 20%, rgba(255,255,255,0.04), transparent);
            pointer-events: none;
        }
        .top-banner-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 32px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
        }
        .brand-icon {
            width: 48px; height: 48px;
            flex-shrink: 0;
        }
        .brand-icon img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: brightness(1.1) drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }
        .brand-text h1 {
            color: var(--white);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .brand-text p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 400;
            margin-top: 2px;
        }
        .brand-badge {
            background: rgba(255,255,255,0.18);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-left: auto;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ===== Main Container ===== */
        .main-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ===== Card / Section ===== */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--slate-200);
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--slate-100);
        }
        .card-step {
            width: 28px; height: 28px;
            background: var(--teal);
            color: var(--white);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            flex-shrink: 0;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--slate-800);
        }
        .card-subtitle {
            font-size: 12px;
            color: var(--slate-400);
            margin-left: auto;
        }
        .card-body { padding: 20px 22px; }

        /* ===== Form Controls ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-group { margin-bottom: 14px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-group.full { grid-column: 1 / -1; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--slate-600);
            margin-bottom: 5px;
        }
        label .required { color: var(--red); margin-left: 2px; }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--slate-800);
            background: var(--white);
            transition: all var(--transition);
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        textarea { min-height: 90px; resize: vertical; line-height: 1.7; }
        input::placeholder, textarea::placeholder { color: var(--slate-400); }



        /* ===== Upload Zone ===== */
        .upload-zone {
            border: 2px dashed var(--slate-300);
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--slate-50);
            position: relative;
        }
        .upload-zone:hover, .upload-zone.active {
            border-color: var(--teal);
            background: var(--teal-light);
        }
        .upload-zone .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.8; }
        .upload-zone .text { font-size: 14px; font-weight: 600; color: var(--slate-600); }
        .upload-zone .hint { font-size: 12px; color: var(--slate-400); margin-top: 4px; }

        /* ===== Photo Status Bar ===== */
        .photo-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .photo-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--teal-light);
            color: var(--teal-dark);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .sort-hint {
            font-size: 11px;
            color: var(--slate-400);
        }

        /* ===== Photo Grid ===== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 12px;
            padding-bottom: 4px;
        }
        .photo-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1.5px solid var(--slate-200);
            transition: all var(--transition);
            position: relative;
            cursor: grab;
            user-select: none;
        }
        .photo-card:hover {
            border-color: var(--teal);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .photo-card.dragging {
            opacity: 0.4;
            transform: scale(0.96);
            cursor: grabbing;
        }
        .photo-card.drag-over {
            border-color: var(--teal);
            border-style: dashed;
            background: var(--teal-light);
        }
        .photo-card .thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            pointer-events: none;
            background: var(--slate-100);
        }
        .photo-card .num {
            position: absolute;
            top: 8px; left: 8px;
            background: var(--slate-900);
            color: var(--white);
            min-width: 22px; height: 22px;
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            padding: 0 6px;
            pointer-events: none;
            opacity: 0.85;
        }
        .photo-card .actions {
            position: absolute;
            top: 8px; right: 8px;
            display: flex; gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .photo-card:hover .actions { opacity: 1; }
        .photo-card .actions button {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-move {
            background: rgba(0,0,0,0.55);
            color: var(--white);
            backdrop-filter: blur(4px);
        }
        .btn-move:hover { background: var(--teal); }
        .btn-move:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-del {
            background: rgba(230,59,46,0.85);
            color: var(--white);
        }
        .btn-del:hover { background: var(--red); }
        .photo-card .caption-input {
            display: block;
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-top: 1px solid var(--slate-100);
            font-size: 12px;
            font-family: inherit;
            color: var(--slate-700);
            background: var(--slate-50);
            transition: background var(--transition), border-color var(--transition);
        }
        .photo-card .caption-input:focus {
            outline: none;
            background: var(--teal-light);
            border-top-color: var(--teal);
        }
        .photo-card .caption-input.filled {
            border-top-color: #48bb78;
            background: #f0fff4;
        }

        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: var(--slate-400);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; opacity: 0.6; }
        .empty-state .text { font-size: 13px; }

        /* ===== Batch Caption ===== */
        .batch-caption-area {
            border-top: 1px solid var(--slate-100);
            padding: 14px 22px;
            display: none;
        }
        .batch-caption-area.show { display: block; }
        .batch-caption-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .batch-caption-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
        }
        .batch-caption-row input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .batch-caption-row button {
            padding: 8px 16px;
            background: var(--teal);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background var(--transition);
        }
        .batch-caption-row button:hover { background: var(--teal-dark); }
        .batch-hint { font-size: 11px; color: var(--slate-400); margin-top: 6px; }

        /* ===== Image Compression Toggle ===== */
        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            border-top: 1px solid var(--slate-100);
            font-size: 13px;
            color: var(--slate-600);
        }
        .toggle {
            position: relative;
            width: 36px; height: 20px;
            flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider {
            position: absolute;
            inset: 0;
            background: var(--slate-300);
            border-radius: 10px;
            transition: background var(--transition);
            cursor: pointer;
        }
        .toggle .slider::before {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            left: 2px; top: 2px;
            background: var(--white);
            border-radius: 50%;
            transition: transform var(--transition);
        }
        .toggle input:checked + .slider { background: var(--teal); }
        .toggle input:checked + .slider::before { transform: translateX(16px); }

        /* ===== Generate Button ===== */
        .generate-section { padding: 0 0 0; }
        .btn-generate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 100%);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
            box-shadow: 0 4px 16px rgba(42,175,179,0.25);
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(42,175,179,0.35);
        }
        .btn-generate:active { transform: translateY(0); }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== Loading ===== */
        .loading-overlay {
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            padding: 32px;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--slate-200);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 13px; color: var(--slate-500); }

        /* ===== Toast Messages ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
            max-width: 380px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #065f46; color: var(--white); }
        .toast.error { background: #991b1b; color: var(--white); }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--slate-400);
        }
        .footer strong { color: var(--teal-dark); font-weight: 600; }
        .report-counter {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--teal-light);
            color: var(--teal-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .top-banner-inner { padding: 20px 18px; gap: 12px; }
            .brand-text h1 { font-size: 17px; }
            .brand-badge { display: none; }
            .main-container { padding: 12px 8px 32px; }
            .card-body { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            .photo-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .photo-card .thumb { height: 110px; }
            .photo-card .actions { opacity: 1; }
            .logo-area { flex-wrap: wrap; }
            .toast { left: 12px; right: 12px; max-width: none; }
        }
    </style>
</head>

            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>工程名稱 <span class="required">*</span></label>

                    </div>

                    </div>

                        <label>施工日期</label>

                    </div>

                        <label>施工說明</label>

                    </div>

            </div>
        </div>

        <div class="card">
            <div class="card-header">

                <span class="card-subtitle" id="photoCountLabel"></span>
            </div>
            <div class="card-body">
                <div class="upload-zone" id="uploadZone">
                    <div class="icon">📷</div>
                    <div class="text">點擊或拖曳照片上傳</div>

                    </div>
                </div>
            </div>

    function getImageDimensions(dataUrl) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({ width: img.width, height: img.height });
            img.onerror = () => resolve({ width: 800, height: 600 });
            img.src = dataUrl;
        });
    }

    // Compress image for smaller docx file
    function compressImage(dataUrl, maxDim = 1600, quality = 0.82) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width > maxDim || height > maxDim) {
                    const ratio = Math.min(maxDim / width, maxDim / height);
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob(blob => {
                    const reader = new FileReader();
                    reader.onload = e => resolve({ buffer: e.target.result, width, height });
                    reader.readAsArrayBuffer(blob);
                }, 'image/jpeg', quality);
            };
            img.onerror = () => resolve(null);
            img.src = dataUrl;
        });
    }

    async function handleFiles(files) {
        const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        if (!validFiles.length) return;

        for (const file of validFiles) {
            const id = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const dataUrl = await new Promise(r => {
                const fr = new FileReader();
                fr.onload = e => r(e.target.result);
                fr.readAsDataURL(file);
            });
            const dims = await getImageDimensions(dataUrl);
            const buffer = await new Promise(r => {
                const fr = new FileReader();
                fr.onload = e => r(e.target.result);
                fr.readAsArrayBuffer(file);
            });
            photos.push({
                id, name: file.name, data: dataUrl, buffer,
                type: file.type.includes('png') ? 'png' : 'jpg',
                caption: '', width: dims.width, height: dims.height
            });
        }
        renderPhotos();
    }

    // ===== Render Photos =====
    function renderPhotos() {
        const count = photos.length;
        $('photoCountLabel').textContent = count ? `${count} 張` : '';
        $('batchCaptionArea').classList.toggle('show', count > 0);
        $('optionRow').style.display = count > 0 ? '' : 'none';

        if (count === 0) {
            photoContainer.innerHTML = '';
            photoContainer.appendChild(emptyPhotos);
            emptyPhotos.style.display = '';
            return;
        }
        emptyPhotos.style.display = 'none';

        let html = '<div class="photo-status"><span class="photo-count-badge">📷 共 ' + count + ' 張照片</span><span class="sort-hint">拖曳卡片或按箭頭排序</span></div><div class="photo-grid">';
        photos.forEach((p, i) => {
            const filled = p.caption.trim() ? ' filled' : '';
            html += `<div class="photo-card" data-index="${i}" draggable="true">
                <span class="num">${i + 1}</span>
                <div class="actions">
                    <button class="btn-move" onclick="movePhoto(${i},-1)" ${i === 0 ? 'disabled' : ''} title="前移">◀</button>
                    <button class="btn-move" onclick="movePhoto(${i},1)" ${i === count - 1 ? 'disabled' : ''} title="後移">▶</button>
                    <button class="btn-del" onclick="deletePhoto('${p.id}')" title="刪除">✕</button>
                </div>
                <img class="thumb" src="${p.data}" alt="${p.name}">
                <input class="caption-input${filled}" type="text" id="cap_${p.id}" placeholder="輸入照片說明..."
                    value="${escapeAttr(p.caption)}" oninput="updateCaption('${p.id}',this.value,this)">
            </div>`;
        });
        html += '</div>';
        photoContainer.innerHTML = html;
        initDragAndDrop();
    }

    function escapeAttr(s) { return s.replace(/"/g, '&quot;'); }

    // ===== Drag & Drop =====
    function initDragAndDrop() {
        photoContainer.querySelectorAll('.photo-card').forEach(card => {
            card.addEventListener('dragstart', function(e) {
                draggedIndex = +this.dataset.index;
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', draggedIndex);
            });
            card.addEventListener('dragend', function() {
                this.classList.remove('dragging');
                this.style.opacity = '';
                photoContainer.querySelectorAll('.photo-card').forEach(c => c.classList.remove('drag-over'));
                draggedIndex = null;
            });
            card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            card.addEventListener('dragenter', function(e) {
                e.preventDefault();
                if (+this.dataset.index !== draggedIndex) this.classList.add('drag-over');
            });
            card.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
            card.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                const target = +this.dataset.index;
                if (draggedIndex !== null && draggedIndex !== target) {
                    syncCaptions();
                    const [moved] = photos.splice(draggedIndex, 1);
                    photos.splice(target, 0, moved);
                    renderPhotos();
                }
            });
        });
    }

    function movePhoto(i, dir) {
        const j = i + dir;
        if (j < 0 || j >= photos.length) return;
        syncCaptions();
        [photos[i], photos[j]] = [photos[j], photos[i]];
        renderPhotos();
    }

    function updateCaption(id, val, el) {
        const p = photos.find(x => x.id === id);
        if (p) { p.caption = val; el.classList.toggle('filled', val.trim() !== ''); }
    }

    function deletePhoto(id) {
        syncCaptions();
        photos = photos.filter(p => p.id !== id);
        renderPhotos();
    }

    function syncCaptions() {
        photos.forEach(p => {
            const el = document.getElementById('cap_' + p.id);
            if (el) p.caption = el.value;
        });
    }

    function applyBatchCaption() {
        const val = $('batchCaptionInput').value.trim();
        if (!val) return;
        syncCaptions();
        let applied = 0;
        photos.forEach(p => { if (!p.caption.trim()) { p.caption = val; applied++; } });
        renderPhotos();
        showToast(applied ? `已套用 ${applied} 張照片的說明` : '所有照片已有說明，未做變更');
    }

    function calcScaledEMU(w, h, maxW, maxH) {

        return { width: Math.round(w * r), height: Math.round(h * r) };

            // Border helpers
            const border = (color, size = 1) => ({ style: BorderStyle.SINGLE, size, color });
            const noBdr = { style: BorderStyle.NONE, size: 0, color: C.WHITE };
            const noBorders = { top: noBdr, bottom: noBdr, left: noBdr, right: noBdr };
            const tealBorders = { top: border(C.TEAL, 1), bottom: border(C.TEAL, 1), left: border(C.TEAL, 1), right: border(C.TEAL, 1) };
            const lightBorders = { top: border(C.GRAY_LINE, 1), bottom: border(C.GRAY_LINE, 1), left: border(C.GRAY_LINE, 1), right: border(C.GRAY_LINE, 1) };
            const font = "微軟正黑體";

            // Dimensions (EMU)
            const coverLogoWEMU = 1143000, coverLogoHEMU = 1333500;
            const photoWEMU = 2095500, photoHEMU = 2790825;
            const headerLogoWEMU = 450000, headerLogoHEMU = 525000;

            // ============================================================
            // ===== COVER PAGE — refined brand layout =====
            // ============================================================
            const cover = [];

            // Top spacing
            cover.push(new Paragraph({ spacing: { before: 200 }, children: [] }));

            // Logo (embedded, centered)
            const ls = calcScaledEMU(coverLogoWEMU, coverLogoHEMU, coverLogoWEMU, coverLogoHEMU);
            cover.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { after: 80 },
                children: [new ImageRun({ type: logoData.type, data: logoData.data, transformation: { width: emuToPx(ls.width), height: emuToPx(ls.height) } })]
            }));

            // Company name
            cover.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 40, after: 20 },
                children: [new TextRun({ text: "尚緯消防工程行", bold: true, size: 40, color: C.TEAL_DARK, font })]
            }));

            // Slogan
            cover.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { after: 60 },
                children: [new TextRun({ text: "專業 • 品質 • 安全", size: 20, color: C.RED, font })]
            }));

            // ── Red accent line ──
            cover.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { after: 80 },
                children: [new TextRun({ text: "━━━━━━━━━━", color: C.RED, size: 16 })]
            }));

            // ── Title block: 「施工報告書」inside teal banner ──
            const titleTable = new Table({
                alignment: AlignmentType.CENTER,
                columnWidths: [9360],
                rows: [new TableRow({
                    children: [new TableCell({
                        width: { size: 9360, type: WidthType.DXA },
                        borders: noBorders,
                        shading: { fill: C.TEAL, type: ShadingType.CLEAR },
                        verticalAlign: VerticalAlign.CENTER,
                        children: [new Paragraph({
                            alignment: AlignmentType.CENTER,
                            spacing: { before: 200, after: 200 },
                            children: [new TextRun({ text: "施 工 報 告 書", bold: true, size: 64, color: C.WHITE, font })]
                        })]
                    })]
                })]
            });
            cover.push(titleTable);

            cover.push(new Paragraph({ spacing: { before: 400 }, children: [] }));

            // ── Info table (teal left column, white right) ──
            const infoRows = [["工程名稱", projectName], ["報告日期", reportDate]];
            if (workDate) infoRows.push(["施工日期", workDate]);

            const infoTable = new Table({
                alignment: AlignmentType.CENTER,
                columnWidths: [2400, 6960],
                rows: infoRows.map(([label, value], idx) => new TableRow({
                    children: [
                        new TableCell({
                            width: { size: 2400, type: WidthType.DXA },
                            borders: { top: border(C.TEAL, 1), bottom: border(C.TEAL, 1), left: border(C.TEAL, 4), right: border(C.TEAL, 1) },
                            shading: { fill: C.TEAL_DEEP, type: ShadingType.CLEAR },
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                alignment: AlignmentType.CENTER,
                                spacing: { before: 130, after: 130 },
                                children: [new TextRun({ text: label, bold: true, color: C.WHITE, size: 24, font })]
                            })]
                        }),
                        new TableCell({
                            width: { size: 6960, type: WidthType.DXA },
                            borders: { top: border(C.TEAL, 1), bottom: border(C.TEAL, 1), left: border(C.TEAL, 1), right: border(C.TEAL, 1) },
                            shading: { fill: C.TEAL_BG, type: ShadingType.CLEAR },
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                alignment: AlignmentType.CENTER,
                                spacing: { before: 130, after: 130 },
                                children: [new TextRun({ text: value, size: 24, color: C.BLACK, font })]
                            })]
                        })
                    ]
                }))
            });
            cover.push(infoTable);

            cover.push(new Paragraph({ spacing: { before: 400 }, children: [] }));

            // ── Section heading helper ──
            function sectionHeading(text) {
                return new Table({
                    alignment: AlignmentType.CENTER,
                    columnWidths: [9360],
                    rows: [new TableRow({
                        children: [new TableCell({
                            width: { size: 9360, type: WidthType.DXA },
                            borders: { top: noBdr, bottom: border(C.TEAL, 6), left: border(C.RED, 8), right: noBdr },
                            shading: { fill: C.GRAY_BG, type: ShadingType.CLEAR },
                            children: [new Paragraph({
                                spacing: { before: 100, after: 100 },
                                indent: { left: 200 },
                                children: [
                                    new TextRun({ text: text, bold: true, size: 26, color: C.TEAL_DARK, font })
                                ]
                            })]
                        })]
                    })]
                });
            }

            // ── 一、施工說明 ──
            cover.push(sectionHeading("一、施工說明"));
            cover.push(new Paragraph({ spacing: { before: 120 }, children: [] }));

            const descTable = new Table({
                alignment: AlignmentType.CENTER,
                columnWidths: [9360],
                rows: [new TableRow({
                    height: { value: 4200, rule: "atLeast" },
                    children: [new TableCell({
                        width: { size: 9360, type: WidthType.DXA },
                        borders: lightBorders,
                        children: [new Paragraph({
                            spacing: { before: 200, after: 200 },
                            indent: { left: 240, right: 240 },
                            children: [new TextRun({ text: description || "（請填入施工說明內容）", size: 22, color: description ? C.BLACK : C.GRAY_LIGHT, font })]
                        })]
                    })]
                })]
            });
            cover.push(descTable);

            cover.push(new Paragraph({ spacing: { before: 400 }, children: [] }));

            // ── 二、施工照片(如下頁) ──
            cover.push(sectionHeading("二、施工照片（如下頁）"));


            // ============================================================
            // ===== PHOTO PAGES — redesigned with brand colors =====
            // ============================================================
            const photoPages = [];

            for (let ps = 0; ps < processedPhotos.length; ps += 4) {
                if (ps > 0) photoPages.push(new Paragraph({ children: [new PageBreak()] }));
                const page = processedPhotos.slice(ps, ps + 4);
                const rows = [];

                for (let i = 0; i < page.length; i += 2) {
                    const p1 = page[i], p2 = page[i + 1];
                    const photoCells = [], captionCells = [];

                    // Helper: create photo cell
                    function makePhotoCell(photo) {
                        if (!photo) return new TableCell({
                            width: { size: 4680, type: WidthType.DXA },
                            borders: lightBorders,
                            children: [new Paragraph({ children: [] })]
                        });
                        const sc = calcScaledEMU(photo.width, photo.height, photoWEMU, photoHEMU);
                        return new TableCell({
                            width: { size: 4680, type: WidthType.DXA },
                            borders: { top: border(C.TEAL, 2), bottom: border(C.GRAY_LINE, 1), left: border(C.TEAL, 2), right: border(C.TEAL, 2) },
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                alignment: AlignmentType.CENTER,
                                spacing: { before: 40, after: 40 },
                                children: [new ImageRun({ type: photo.type, data: photo.buffer, transformation: { width: emuToPx(sc.width), height: emuToPx(sc.height) } })]
                            })]
                        });
                    }

                    // Helper: create caption cell
                    function makeCaptionCell(photo) {
                        if (!photo) return new TableCell({
                            width: { size: 4680, type: WidthType.DXA },
                            borders: lightBorders,
                            shading: { fill: C.TEAL_BG, type: ShadingType.CLEAR },
                            children: [new Paragraph({ children: [] })]
                        });
                        return new TableCell({
                            width: { size: 4680, type: WidthType.DXA },
                            borders: { top: border(C.GRAY_LINE, 1), bottom: border(C.TEAL, 2), left: border(C.TEAL, 2), right: border(C.TEAL, 2) },
                            shading: { fill: C.TEAL_BG, type: ShadingType.CLEAR },
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                alignment: AlignmentType.CENTER,
                                spacing: { before: 80, after: 80 },
                                children: [new TextRun({ text: photo.caption, size: 20, color: C.TEAL_DEEP, font })]
                            })]
                        });
                    }

                    photoCells.push(makePhotoCell(p1), makePhotoCell(p2));
                    captionCells.push(makeCaptionCell(p1), makeCaptionCell(p2));

                    rows.push(new TableRow({ height: { value: 5102, rule: "atLeast" }, children: photoCells }));
                    rows.push(new TableRow({ height: { value: 1000, rule: "atLeast" }, children: captionCells }));
                }

                photoPages.push(new Table({ alignment: AlignmentType.CENTER, columnWidths: [4680, 4680], rows }));
            }


            // ============================================================
            // ===== HEADER — brand bar =====
            // ============================================================
            const headerTable = new Table({
                alignment: AlignmentType.CENTER,
                columnWidths: [1600, 5760, 2000],
                rows: [new TableRow({
                    children: [
                        // Logo
                        new TableCell({
                            width: { size: 1600, type: WidthType.DXA }, borders: noBorders,
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                children: [new ImageRun({ type: logoData.type, data: logoData.data, transformation: { width: emuToPx(headerLogoWEMU), height: emuToPx(headerLogoHEMU) } })]
                            })]
                        }),
                        // Company name
                        new TableCell({
                            width: { size: 5760, type: WidthType.DXA }, borders: noBorders,
                            verticalAlign: VerticalAlign.CENTER,
                            children: [
                                new Paragraph({
                                    alignment: AlignmentType.CENTER,
                                    children: [new TextRun({ text: "尚緯消防工程行", bold: true, color: C.TEAL_DARK, size: 28, font })]
                                }),
                                new Paragraph({
                                    alignment: AlignmentType.CENTER,
                                    spacing: { before: 20 },
                                    children: [new TextRun({ text: "SHANG WEI XIAO FANG", color: C.GRAY_LIGHT, size: 14, font })]
                                })
                            ]
                        }),
                        // Slogan
                        new TableCell({
                            width: { size: 2000, type: WidthType.DXA }, borders: noBorders,
                            verticalAlign: VerticalAlign.CENTER,
                            children: [new Paragraph({
                                alignment: AlignmentType.RIGHT,
                                children: [new TextRun({ text: "專業 • 品質 • 安全", color: C.RED, size: 16, font })]
                            })]
                        })
                    ]
                })]
            });

            const photoHeader = new Header({
                children: [
                    headerTable,
                    // Dual-color header line: teal thick + red thin
                    new Paragraph({
                        border: { bottom: { style: BorderStyle.SINGLE, size: 14, color: C.TEAL } },
                        spacing: { after: 40 },
                        children: []
                    }),
                    new Paragraph({
                        border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: C.RED } },
                        spacing: { after: 200 },
                        children: []
                    })
                ]
            });


            // ============================================================
            // ===== FOOTER — page number with brand accent =====
            // ============================================================
            const photoFooter = new Footer({
                children: [
                    new Paragraph({
                        border: { top: { style: BorderStyle.SINGLE, size: 4, color: C.RED } },
                        children: []
                    }),
                    new Paragraph({
                        border: { top: { style: BorderStyle.SINGLE, size: 8, color: C.TEAL } },
                        children: []
                    }),
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        spacing: { before: 80 },
                        children: [
                            new TextRun({ text: "尚緯消防工程行", color: C.GRAY_LIGHT, size: 14, font }),
                            new TextRun({ text: "    |    ", color: C.GRAY_LINE, size: 14, font }),
                            new TextRun({ text: "第 ", color: C.GRAY, size: 16, font }),
                            new TextRun({ children: [PageNumber.CURRENT], bold: true, color: C.TEAL_DARK, size: 16, font }),
                            new TextRun({ text: " 頁，共 ", color: C.GRAY, size: 16, font }),
                            new TextRun({ children: [PageNumber.TOTAL_PAGES], bold: true, color: C.TEAL_DARK, size: 16, font }),
                            new TextRun({ text: " 頁", color: C.GRAY, size: 16, font })
                        ]
                    })
                ]
            });


            // ============================================================
            // ===== Assemble Document =====
            // ============================================================
            const doc = new Document({
                sections: [
                    // Cover page (no header/footer)
                    {
                        properties: { page: { margin: { top: 720, right: 720, bottom: 720, left: 720 } } },
                        children: cover
                    },
                    // Photo pages (with brand header + footer)
                    {
                        properties: { page: { margin: { top: 1200, right: 720, bottom: 720, left: 720 } } },
                        headers: { default: photoHeader },
                        footers: { default: photoFooter },
                        children: photoPages
                    }
                ]
            });

            const blob = await Packer.toBlob(doc);
            const safeName = projectName.substring(0, 15).replace(/[\\/:*?"<>|]/g, '');
            saveAs(blob, `施工報告_${safeName}_${new Date().toISOString().slice(0, 10)}.docx`);
            incrementReportCount();
            showToast('✅ 報告已產生並下載！');
        } catch (err) {
            console.error('產生報告錯誤:', err);
            showToast('❌ 產生報告時發生錯誤：' + err.message, 'error');
        } finally {
            loading.classList.remove('show');
            generateBtn.disabled = false;
        }
    }
    </script>
    <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</body>
